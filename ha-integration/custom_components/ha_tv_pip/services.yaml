show_notification:
  target:
    device:
      integration: ha_tv_pip
  fields:
    title:
      default: Home Assistant
      selector:
        text:
      name: Title
      description: Larger notification heading text.
      example: Doorbell
    message:
      required: false
      selector:
        text:
          multiline: true
      name: Message
      description: Smaller notification body text.
      example: Someone is at the front door.
    duration_seconds:
      selector:
        number:
          min: 1
          max: 3600
          mode: box
          unit_of_measurement: seconds
      name: Duration
      description: How long the receiver should keep the notification open. Omit to use the receiver default, or 15 seconds if no default is configured.
      example: 15
    enter_pip:
      default: true
      selector:
        boolean:
      name: Enter PiP
      description: Ask the receiver to use PiP or overlay mode when available.
      example: true
    position:
      selector:
        select:
          options:
            - top_right
            - top_left
            - bottom_right
            - bottom_left
      name: Position
      description: Corner where the receiver should place the notification. Omit to use the receiver default.
      example: top_right
    title_color:
      default: "#50BFF2"
      selector:
        text:
      name: Title color
      description: Hex color for the title text.
      example: "#50BFF2"
    title_size:
      default: 24
      selector:
        number:
          min: 10
          max: 48
          mode: box
      name: Title size
      description: Title text size.
      example: 24
    message_color:
      default: "#fbf5f5"
      selector:
        text:
      name: Message color
      description: Hex color for the message text.
      example: "#fbf5f5"
    message_size:
      default: 18
      selector:
        number:
          min: 10
          max: 40
          mode: box
      name: Message size
      description: Message text size.
      example: 18
    background_color:
      default: "#B30F0E0E"
      selector:
        text:
      name: Background color
      description: Hex or alpha-hex color for the notification background. Defaults to a translucent glass-style background.
      example: "#B30F0E0E"
    width:
      required: false
      selector:
        number:
          min: 240
          max: 1600
          mode: box
          unit_of_measurement: px
      name: Width
      description: Optional notification width in pixels. Omit to use the receiver default, or 512 pixels if no default is configured.
      example: 512
    height:
      required: false
      selector:
        number:
          min: 120
          max: 900
          mode: box
          unit_of_measurement: px
      name: Height
      description: Optional notification height in pixels. Omit to use the receiver default or content height.
      example: 240
