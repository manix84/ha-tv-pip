show_camera:
  target:
    device:
      integration: ha_tv_pip
  fields:
    camera_entity:
      required: true
      selector:
        entity:
          domain: camera
      name: Camera entity
      description: Primary camera entity for the alert title, default stream source, and snapshot fallback.
    stream_camera_entity:
      required: false
      selector:
        entity:
          domain: camera
      name: Stream camera entity
      description: Optional camera entity to use for the live stream. Use this when a lower-resolution, H.264, or MJPEG substream is more reliable on Android TV.
    duration_seconds:
      selector:
        number:
          min: 1
          max: 3600
          mode: box
          unit_of_measurement: seconds
      name: Duration
      description: How long the receiver should keep the display open. Omit to use the receiver default, or 30 seconds if no default is configured.
      example: 30
    enter_pip:
      default: true
      selector:
        boolean:
      name: Enter PiP
      description: Ask the receiver to use PiP or overlay mode when available.
      example: true
    snapshot_fallback:
      selector:
        boolean:
      name: Snapshot fallback
      description: Show a camera snapshot while the video stream loads, when Home Assistant exposes one. Omit to use the receiver default.
      example: true
    snapshot_camera_entity:
      required: false
      selector:
        entity:
          domain: camera
      name: Snapshot fallback camera entity
      description: Optional camera entity to use for the loading snapshot. Defaults to the main camera entity.
    stream_type:
      selector:
        select:
          options:
            - auto
            - hls
            - mjpeg
            - mjpeg_first
            - snapshot
      name: Stream type
      description: Choose automatic handling, force HLS, force MJPEG, prefer MJPEG with fallback, or send a snapshot. Omit to use the receiver's preferred stream strategy.
      example: auto
    title:
      required: false
      selector:
        text:
      name: Title
      description: Optional display title. Defaults to the camera friendly name.
      example: Front Door
    message:
      required: false
      selector:
        text:
          multiline: true
      name: Message
      description: Optional smaller text to overlay on the camera popup.
      example: Motion detected at the front door.
    position:
      selector:
        select:
          options:
            - top_right
            - top_left
            - bottom_right
            - bottom_left
      name: Position
      description: Corner where optional overlay text should appear. Omit to use the receiver default.
      example: top_right
    title_color:
      default: "#50BFF2"
      selector:
        text:
      name: Title color
      description: Hex color for the title text when message overlay is used.
      example: "#50BFF2"
    title_size:
      default: 24
      selector:
        number:
          min: 10
          max: 48
          mode: box
      name: Title size
      description: Title text size when message overlay is used.
      example: 24
    message_color:
      default: "#fbf5f5"
      selector:
        text:
      name: Message color
      description: Hex color for the message text.
      example: "#fbf5f5"
    message_size:
      default: 18
      selector:
        number:
          min: 10
          max: 40
          mode: box
      name: Message size
      description: Message text size.
      example: 18
    background_color:
      default: "#B30F0E0E"
      selector:
        text:
      name: Background color
      description: Hex or alpha-hex color for the optional text overlay background.
      example: "#B30F0E0E"
    width:
      required: false
      selector:
        number:
          min: 240
          max: 1600
          mode: box
          unit_of_measurement: px
      name: Width
      description: Optional overlay width in pixels. Omit to use the receiver default or its sensible popup width.
      example: 720
    height:
      required: false
      selector:
        number:
          min: 120
          max: 900
          mode: box
          unit_of_measurement: px
      name: Height
      description: Optional overlay height in pixels. Omit to use the receiver default; media popups otherwise use 640x360.
      example: 405
